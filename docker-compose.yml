services:
  crypto-trader-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-trader-bot
    ports:
      - "8000:8000"  # Dashboard web interface
    volumes:
      # IMPORTANT: Use host-absolute paths — /projects inside this container
      # maps to /home/pi/Projects on the Pi host where Docker daemon runs.
      # Relative paths like ./data resolve inside Hermes' filesystem which
      # doesn't match the Docker host's view.
      - /home/pi/Projects/crypto-trader-bot/data:/app/data
      - /home/pi/Projects/crypto-trader-bot/models:/app/models
      - /home/pi/Projects/crypto-trader-bot/config:/app/config
    environment:
      - PYTHONPATH=/app
      # Proxy configuration for HTTPS requests (commented out for now)
      # - HTTP_PROXY=http://crypto-trader-nginx:3128
      # - HTTPS_PROXY=http://crypto-trader-nginx:3129
      # - NO_PROXY=localhost,127.0.0.1,crypto-trader-bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/status', timeout=30)"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    # Security: Run as non-root user
    user: "1000:1000"
    # Resource limits for Raspberry Pi (with memory cgroup support)
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  # Nginx reverse + forward proxy for production
  nginx:
    image: nginx:alpine
    container_name: crypto-trader-nginx
    network_mode: host  # Use host networking for proxy functionality
    ports:
      - "80:80"           # Dashboard HTTP (reverse proxy)
      - "443:443"         # Dashboard HTTPS (reverse proxy)
      - "3128:3128"       # Forward proxy: Coinbase Advanced API
      - "3129:3129"       # Forward proxy: Coinbase Exchange API
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
      - ./logs/nginx:/var/log/nginx  # Proxy logs
    depends_on:
      - crypto-trader-bot
    restart: unless-stopped
    profiles: ["production"]  # Only start in production

networks:
  default:
    name: crypto-trader-network