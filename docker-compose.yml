services:
  crypto-trader-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-trader-bot
    ports:
      - "8000:8000"  # Dashboard web interface
    volumes:
      - ./data:/app/data          # Persistent database and logs
      - ./models:/app/models      # Trained AI models
      - ./config:/app/config      # Configuration files (read-only for security)
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security: Run as non-root user
    user: "1000:1000"
    # Resource limits for Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: crypto-trader-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - crypto-trader-bot
    restart: unless-stopped
    profiles: ["production"]  # Only start in production

networks:
  default:
    name: crypto-trader-network